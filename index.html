  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

A; box-shadow:0 20px 46px rgba(0,0,0,0.35); display:block;\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <a href=\"#profil\" aria-label=\"Défiler vers le profil\" style=\"position:absolute; left:50%; bottom:28px; transform:translateX(-50%); z-index:2; color:#93A5B6; animation:bob-arrow 2.2s ease-in-out infinite;\">\n      <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><path d=\"M6 9l6 6 6-6\"><\u002Fpath><\u002Fsvg>\n    <\u002Fa>\n  <\u002Fheader>\n\n  <!-- ============ PROFIL ============ -->\n  <section id=\"profil\" style=\"padding:104px 0; scroll-margin-top:76px; background:#F6F1E8;\">\n    <div style=\"max-width:1080px; margin:0 auto; padding:0 40px;\">\n      <div data-reveal=\"true\" style=\"margin-bottom:56px; opacity:0; transform:translateY(20px); transition:opacity .8s cubic-bezier(.16,1,.3,1), transform .8s cubic-bezier(.16,1,.3,1);\">\n        <span style=\"font-family:'JetBrains Mono', monospace; font-size:0.75rem; letter-spacing:0.18em; text-transform:uppercase; color:#8A6414; display:block; margin-bottom:12px;\">Profil<\u002Fspan>\n        <h2 style=\"font-family:'Oswald', sans-serif; font-weight:600; font-size:clamp(1.8rem, 3.6vw, 2.5rem); color:#201A12; margin:0;\">De l'agence bancaire à l'univers de la donnée<\u002Fh2>\n      <\u002Fdiv>\n      <div data-reveal=\"true\" data-delay=\"100\" style=\"max-width:64ch; display:flex; flex-direction:column; gap:20px; opacity:0; transform:translateY(20px); transition:opacity .8s cubic-bezier(.16,1,.3,1) .1s, transform .8s cubic-bezier(.16,1,.3,1) .1s;\">\n        <p style=\"font-size:1.12rem; color:#201A12; margin:0;\">Après 13 ans d'expérience dans le secteur bancaire auprès d'une clientèle professionnelle, j'ai développé une forte capacité d'analyse, une compréhension des enjeux métiers et un sens concret de la prise de décision.<\u002Fp>\n        <p style=\"font-size:1.02rem; color:#201A12; margin:0;\">Aujourd'hui en reconversion vers les métiers de la data, je me forme en Data Analyst à la Wild Code School, où j'acquiers des compétences en Python, SQL et Power BI afin de transformer les données en leviers d'action.<\u002Fp>\n        <p style=\"font-size:1.02rem; color:#201A12; margin:0;\">Admis au parcours CPGEOM – Chef de Projet en Géomatique à IDGEO, je souhaite me spécialiser dans l'exploitation des données géospatiales pour contribuer à des projets concrets à forte valeur ajoutée.<\u002Fp>\n        <p style=\"font-size:1.02rem; color:#201A12; margin:0;\">Curieux, rigoureux et orienté résultats, je suis activement à la recherche d'une alternance pour mettre mes compétences au service d'une entreprise.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ ITINÉRAIRE ============ -->\n  <section id=\"itineraire\" style=\"padding:104px 0; scroll-margin-top:76px; background:#16211C; color:#EFEBE0;\">\n    <div style=\"max-width:1080px; margin:0 auto; padding:0 40px;\">\n      <div data-reveal=\"true\" style=\"margin-bottom:56px; opacity:0; transform:translateY(20px); transition:opacity .8s cubic-bezier(.16,1,.3,1), transform .8s cubic-bezier(.16,1,.3,1);\">\n        <span style=\"font-family:'JetBrains Mono', monospace; font-size:0.75rem; letter-spacing:0.18em; text-transform:uppercase; color:#D9A54A; display:block; margin-bottom:12px;\">Mon itinéraire<\u002Fspan>\n        <h2 style=\"font-family:'Oswald', sans-serif; font-weight:600; font-size:clamp(1.8rem, 3.6vw, 2.5rem); color:#EFEBE0; margin:0;\">Mes 3 étapes<\u002Fh2>\n      <\u002Fdiv>\n\n      <div style=\"position:relative; padding-left:46px;\">\n        <div style=\"position:absolute; left:9px; top:6px; bottom:6px; width:2px; background:repeating-linear-gradient(to bottom, #D9A54A 0px, #D9A54A 6px, transparent 6px, transparent 12px);\"><\u002Fdiv>\n\n        <sc-for list=\"{{ waypoints }}\" as=\"wp\" hint-placeholder-count=\"3\">\n          <div data-reveal=\"true\" data-delay=\"{{ wp.del ins Mono', monospace; font-size:0.7rem; background:#F3E6C8; color:#6B4E0E; padding:4px 11px; border-radius:20px;\">{{ t }}<\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"display:flex; gap:18px; margin-top:6px; flex-wrap:wrap;\">\n                <sc-for list=\"{{ proj.links }}\" as=\"lnk\" hint-placeholder-count=\"2\">\n                  <a href=\"{{ lnk.href }}\" target=\"_blank\" rel=\"noopener\" style=\"font-family:'JetBrains Mono', monospace; font-size:0.8rem; color:#16211C; border-bottom:1px solid #16211C; padding-bottom:2px; transition:color .25s ease, border-color .25s ease, transform .25s ease; display:inline-block;\" style-hover=\"color:#8A6414; border-color:#8A6414; transform:translateX(3px);\">{{ lnk.label }} ↗<\u002Fa>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ COMPÉTENCES ============ -->\n  <section id=\"competences\" style=\"padding:104px 0; scroll-margin-top:76px; background:#1E2B25; color:#EFEBE0;\">\n    <div style=\"max-width:1080px; margin:0 auto; padding:0 40px;\">\n      <div data-reveal=\"true\" style=\"margin-bottom:56px; opacity:0; transform:translateY(20px); transition:opacity .8s cubic-bezier(.16,1,.3,1), transform .8s cubic-bezier(.16,1,.3,1); display:flex; align-items:flex-end; justify-content:space-between; flex-wrap:wrap; gap:24px;\">\n        <div>\n          <span style=\"font-family:'JetBrains Mono', monospace; font-size:0.75rem; letter-spacing:0.18em; text-transform:uppercase; color:#D9A54A; display:block; margin-bottom:12px;\">Légende<\u002Fspan>\n          <h2 style=\"font-family:'Oswald', sans-serif; font-weight:600; font-size:clamp(1.8rem, 3.6vw, 2.5rem); color:#EFEBE0; margin:0;\">Compétences<\u002Fh2>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:flex-end; gap:6px; height:44px;\" aria-hidd pan style=\"color:{{ it.textColor }}; font-style:{{ it.fontStyle }};\">{{ it.label }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ CONTACT ============ -->\n  <section id=\"contact\" style=\"padding:104px 0; scroll-margin-top:76px; background:#F6F1E8;\">\n    <div style=\"max-width:1080px; margin:0 auto; padding:0 40px;\">\n      <div data-reveal=\"true\" style=\"display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:32px; border-top:1px solid #ECE3D1; padding-top:48px; opacity:0; transform:translateY(20px); transition:opacity .8s cubic-bezier(.16,1,.3,1), transform .8s cubic-bezier(.16,1,.3,1);\">\n        <h2 style=\"font-family:'Oswald', sans-serif; font-weight:600; font-size:clamp(1.9rem, 4vw, 2.7rem); max-width:16ch; margin:0; color:#201A12;\">Une opportunité en géomatique ou en data à me proposer ?<\u002Fh2>\n        <div style=\"font-family:'JetBrains Mono', monospace; font-size:0.95rem;\">\n          <sc-for list=\"{{ contactLinks }}\" as=\"c\" hint-placeholder-count=\"5\">\n            <a href=\"{{ c.href }}\" target=\"{{ c.target }}\" rel=\"noopener\" style=\"display:block; margin-bottom:10px; border-bottom:1px solid transparent; color:#201A12; transition:color .25s ease, border-color .25s ease;\" style-hover=\"color:#8A6414; border-color:#8A6414;\">{{ c.label }}<\u002Fa>\n          <\u002Fsc-for>\n          <a href=\".\u002Fassets\u002FCV-Romain-Lafforgue.pdf\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block; margin-top:14px; padding:12px 22px; border-radius:8px; border:1px solid #201A12; color:#201A12; font-size:0.85rem; transition:transform .25s ease, border-color .25s ease, color .25s ease;\" style-hover=\"transform:translateY(-3px); border-color:#8A6414; color:#8A6414;\">Télécharger mon CV ↓<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer style=\"background:#16211C; color:#93A5B6; text-align:center; padding:30px 0; font-family:'JetBrains Mono', monospace; font-size:0.75rem; letter-spacing:0.04em;\">\n    ROMAIN LAFFORGUE — {{ year }}\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text\u002Fx-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.state = { scrolled: false, activeSection: 'profil', isMobile: false, mobileMenuOpen: false };\n    this.contoursRef = React.createRef();\n    this.sectionIds = ['profil', 'itineraire', 'projets', 'competences', 'contact'];\n    this.onScroll = this.onScroll.bind(this);\n    this.onResize = this.onResize.bind(this);\n    this.toggleMobileMenu = this.toggleMobileMenu.bind(this);\n    this.closeMobileMenu = this.closeMobileMenu.bind(this);\n  }\n\n  componentDidMount() {\n    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n\n    \u002F\u002F reveal-on-scroll\n    const els = document.querySelectorAll('[data-reveal]');\n    if (reduced) {\n      els.forEach((el) => { el.style.opacity = '1'; el.style.transform = 'none'; });\n    } else {\n      const io = new IntersectionObserver((entries) => {\n        entries.forEach((entry) => {\n          if (entry.isIntersecting) {\n            entry.target.style.opacity = '1';\n            entry.target.style.transform = 'none';\n            io.unobserve(entry.target);\n          }\n        });\n      }, { threshold: 0.15 });\n      els.forEach((el) => io.observe(el));\n    }\n\n    \u002F\u002F subtle parallax + scroll-aware nav\n    window.addEventListener('scroll', this.onScroll, { passive: true });\n    this.onScroll();\n\n    window.addEventListener('resize', this.onResize);\n    this.onResize();\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('scroll', this.onScroll);\n    window.removeEventListener('resize', this.onResize);\n  }\n\n  onResize() {\n    const isMobile = window.innerWidth < 640;\n    if (isMobile !== this.state.isMobile) this.setState({ isMobile, mobileMenuOpen: isMobile ? this.state.mobileMenuOpen : false });\n  }\n\n  toggleMobileMenu() {\n    this.setState((s) => ({ mobileMenuOpen: !s.mobileMenuOpen }));\n  }\n\n  closeMobileMenu() {\n    this.setState({ mobileMenuOpen: false });\n  }\n\n  onScroll() {\n    const y = window.scrollY || 0;\n    if (this.contoursRef.current) {\n      const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n      if (!reduced) {\n        this.contoursRef.current.style.transform = 'translateY(' + Math.min(y * 0.12, 60) + 'px)';\n      }\n    }\n    const scrolled = y > 40;\n    if (scrolled !== this.state.scrolled) this.setState({ scrolled });\n\n    let active = this.state.activeSection;\n    for (const id of this.sectionIds) {\n      const el = document.getElementById(id);\n      if (el && el.getBoundingClientRect().top < window.innerHeight * 0.4) active = id;\n    }\n    if (active !== this.state.activeSection) this.setState({ activeSection: active });\n  }\n\n  renderVals() {\n    const active = this.state.activeSection;\n    const linkColor = (id) => (active === id ? '#D9A54A' : '#93A5B6');\n    const linkUnderline = (id) => (active === id ? 1 : 0);\n    const menuOpen = this.state.mobileMenuOpen;\n\n    return {\n      contoursRef: this.contoursRef,\n      navBg: this.state.scrolled ? 'rgba(22,33,28,0.88)' : 'linear-gradient(to bottom, rgba(22,33,28,0.85), rgba(22,33,28,0))',\n      navShadow: this.state.scrolled ? '0 1px 0 rgba(255,255,255,0.06)' : 'none',\n      year: new Date().getFullYear(),\n\n      toggleMobileMenu: this.toggleMobileMenu,\n      closeMobileMenu: this.closeMobileMenu,\n      desktopNavDisplay: this.state.isMobile ? 'none' : 'flex',\n      hamburgerDisplay: this.state.isMobile ? 'flex' : 'none',\n      mobileMenuDisplay: menuOpen ? 'flex' : 'none',\n      barTopTransform: menuOpen ? 'translateY(7px) rotate(45deg)' : 'none',\n
